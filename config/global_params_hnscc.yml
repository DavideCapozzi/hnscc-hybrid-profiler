# ==============================================================================
# PROJECT CONFIGURATION: onco-hybrid-profiler (Responder vs Non-Responder)
# ==============================================================================

# --- System Setup ---
output_root: "results"
# project_name: "results-hnscc"
# input_file: "data/Dati_HNSCC_standardizzati.xlsx"
project_name: "results-nsclc"
input_file: "data/Dati_NSCLC.xlsx"

# --- Clinical Grouping ---
# Define the column that contains the clinical outcome and the target labels
clinical:
  target_column: "Clinical_Response"
  responder_label: "R"
  non_responder_label: "NR"

# --- Data Dictionaries (Hybrid Logic) ---
# Explicitly define which columns belong to which assay. 
# Markers not listed here will be ignored.
features:
  facs:
    - "M_MDSC"
    - "LOX1_PMN_MDSC"
    - "T_reg"
    - "Resting"
    - "Active"
    - "Non_suppressive"
    - "TregCD137"
    - "CD3_CD137"
    - "CD8_CD137"
    - "CD4_CD137"
  soluble:
    - "sBTLA"
    - "sCD137"
    - "sCD152"
    - "sCD27"
    - "sCD28"
    - "sGITR"
    - "IDO"
    - "sLAG3"
    - "sPD1"
    - "sPDL_2"
    - "sTIM3"
    - "sCD80"
    - "sHVEM"

# --- Quality Control ---
qc:
  max_na_row_pct: 0.40       # Drop patients missing > 40% of TOTAL data
  max_na_col_facs_pct: 0.20  # Strict missingness filter for FACS markers
  max_na_col_sol_pct: 0.50   # Relaxed missingness filter for Soluble markers
  remove_outliers: true
  outlier_conf_level: 0.99

# --- Transformation & Imputation ---
transformation:
  facs_method: "logit"       # Transforms 0-100 percentages to unbounded space
  facs_format: "percentage"  
  soluble_method: "log2"     # Options: "log2" or "none" (for solubles)
  epsilon: 1e-4         # Data-driven pseudo-count for 0s or LODs

stats:
  seed: 2026

# --- Multivariate Analysis (sPLS-DA) ---
multivariate:
  n_comp: 2           
  validation_folds: 5 
  n_repeat_cv: 50
  top_n_loadings: 15  

# --- Visualization & Colors ---
colors:
  groups:
    Responder: "#2E8B57"     # Green
    Non_Responder: "#B2182B" # Red
  plsda:
    positive: "#B2182B"
    negative: "#2E8B57"
  heatmap:
    low: "#2166AC"    
    mid: "#F7F7F7"    
    high: "#B2182B"
