# ==============================================================================
# BASE CONFIGURATION: clinical-onco-profiler (Global Parameters)
# ==============================================================================

# --- System Setup ---
output_root: "results"
project_name: "base_run"
input_file: "data/Dati_NSCLC_standardizzati_T0.xlsx"
input_file_t0: "data/Dati_NSCLC_standardizzati_T0.xlsx"
input_file_t1: "data/Dati_NSCLC_standardizzati_T1.xlsx"

# --- Experiment Iterations ---
experiments:
  BestResponse_2v3_4:
    is_longitudinal: true
    run_network: true
    clinical:
      target_column: "Best_response_rate_RC_1_RP_2_SD_3_PD_4"
      responder_label: "RP"
      non_responder_label: "SD_PD"
      mapping:
        RP: [2]
        SD_PD: [3, 4]

  Comorbidity_1v0:
    is_longitudinal: true
    run_network: false
    clinical:
      target_column: "comorbidità_No_0_Si_1"
      responder_label: "Comorb_Yes"
      non_responder_label: "Comorb_No"
      mapping:
        Comorb_Yes: [1]
        Comorb_No:  [0]

  Toxicity_1v0:
    is_longitudinal: true
    run_network: false
    clinical:
      target_column: "tossicità_da_immuno_No_0_Si_1"
      responder_label: "Tox_Yes"
      non_responder_label: "Tox_No"
      mapping:
        Tox_Yes: [1]
        Tox_No:  [0]

# --- Data Dictionaries (Hybrid Logic) ---
features:
  facs:
    - "CD3tot"
    - "CD4tot"
    - "CD8tot"
    - "CM"
    - "EFF"
    - "EM"
    - "NAIVE"
    - "CD28"
    - "CD28CD4"
    - "CD28CD8"
    - "CD28KI67"
    - "CD28CM"
    - "CD28EFF"
    - "CD28EMRA"
    - "CD28NAIVE"
    - "CD137tot"
    - "CD137CD4"
    - "CD137CD8"
    - "CD137KI67"
    - "CD137PD1"
    - "CD137CM"
    - "CD137EFF"
    - "CD137EMRA"
    - "CD137NAIVE"
    - "KI67"
    - "KI67CD4"
    - "KI67CD8"
    - "KI67CM"
    - "KI67EFF"
    - "KI657EMRA"   
    - "KI67NAIVE"
    - "PD1"
    - "PD1CD4"
    - "PD1CD8"
    - "PD1KI67"
    - "PD1CM"
    - "PD1EFF"
    - "PD1EMRA"
    - "PD1NAIVE"
    - "Treg_tot"
    - "Treg_active"
    - "Treg_resting"
    - "Treg_non_suppr"
    
  soluble:
    - "total_WBC"
    - "neutrophils"
    - "lymphocytes"
    - "neutrophils/lymphocytes"
    - "NOX2_pg/mL"

# --- Quality Control ---
qc:
  max_na_row_pct: 0.40       
  max_na_col_facs_pct: 0.20  
  max_na_col_sol_pct: 0.50   
  max_na_covariates: 0.10
  remove_outliers: true
  outlier_conf_level: 0.99

# --- Transformation & Imputation ---
transformation:
  facs_method: "logit"       
  facs_format: "percentage"  
  soluble_method: "log2"     
  epsilon: 1e-4         

stats:
  seed: 2026

# --- Multivariate Analysis (sPLS-DA) ---
multivariate:
  n_comp: 2           
  validation_folds: 5 
  n_repeat_cv: 50
  top_n_loadings: 15  

# --- Visualization & Colors ---
# EXPANDED: Contains all possible labels injected by the mini-configs
colors:
  groups:
    # Toxicity labels
    Tox_Yes: "#B2182B"       # Red
    Tox_No: "#2E8B57"        # Green
    # Best Response labels
    RP: "#2E8B57"            # Green
    SD_PD: "#B2182B"         # Red
    # Comorbidity labels
    Comorb_Yes: "#B2182B"    # Red
    Comorb_No: "#2E8B57"     # Green
    # Legacy fallbacks
    Responder: "#2E8B57"
    Non_Responder: "#B2182B"
  plsda:
    positive: "#B2182B"
    negative: "#2E8B57"
  heatmap:
    low: "#2166AC"
    mid: "#F7F7F7"
    high: "#B2182B"

# --- Differential Network Analysis (Step 05) ---
# Activated per-experiment via run_network: true in the experiments block.
network:
  n_boot: 1000                 # Bootstrap iterations for baseline stability
  n_perm: 2000                 # Permutation iterations for differential testing (p-value floor 0.0005)
  n_cores: "auto"              # "auto" uses all available cores - 1; or set to a fixed integer
  threshold_type: "absolute"   # "absolute" or "percentile"
  edge_threshold: 0.075        # Minimum |pcor| for a valid edge — lower threshold recovers weak inverted edges
  min_marginal_cor: 0.10       # Minimum delta Pcor for differential significance
  min_network_n: 3             # Minimum samples per group to attempt network inference
  cytoscape_export:            # Baseline network export filters
    min_stability_freq: 0.90   # Edge must appear in ≥90% of bootstrap iterations
    min_abs_pcor: 0.075        # Minimum |pcor| for Cytoscape export (aligned with edge_threshold)
    max_export_edges: 40       # Maximum edges in main Cytoscape file (rest go to remaining/)
  cytoscape_export_diff:       # Differential network export filters
    exclude_conserved: false   # Whether to exclude conserved edges from export
    min_stability_freq_any: 0.90
    min_diff_score: 0.10
    max_export_edges: 40
  feature_selection:           # sPLS-DA-guided panel reduction before network inference
    enabled: true
    method: "splsda_loadings"  # Retain markers with |loading| > min_abs_loading in Step 03
    min_abs_loading: 0.0       # 0 = any marker selected by sPLS-DA in at least one component
    min_features: 8            # Safety floor; reverts to full panel if selection is smaller
    always_include:            # Structural backbone: parent lineage + memory phenotypes
      - "CD3tot"               # Total T cells — anchor for lineage interpretation
      - "CD4tot"
      - "CD8tot"
      - "CM"                   # Central memory
      - "EFF"                  # Effector
      - "EM"                   # Effector memory
      - "NAIVE"
      - "KI657EMRA"            # Terminally differentiated EMRA (note: field name typo in source data)
