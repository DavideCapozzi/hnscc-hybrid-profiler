# ==============================================================================
# BASE CONFIGURATION: onco-hybrid-profiler (Global Parameters)
# ==============================================================================

# --- System Setup ---
output_root: "results"
project_name: "base_run"
input_file: "data/Dati_NSCLC_standardizzati.xlsx"

# --- Clinical Grouping (Fallback/Base) ---
# NOTE: These will be dynamically overwritten by main.R for each experiment
clinical:
  target_column: "tossicità da immuno No=0, Si=1" 
  responder_label: "Tox_Yes"
  non_responder_label: "Tox_No"

# --- Data Dictionaries (Hybrid Logic) ---
# DYNAMIC UPDATE: New markers mapped by data type for correct transformation
features:
  facs:
    - "CD3tot"
    - "CD4tot"
    - "CD8tot"
    - "CM"
    - "EFF"
    - "EM"
    - "NAIVE"
    - "CD28"
    - "CD28CD4"
    - "CD28CD8"
    - "CD28KI67"
    - "CD28CM"
    - "CD28EFF"
    - "CD28EMRA"
    - "CD28NAIVE"
    - "CD137tot"
    - "CD137CD4"
    - "CD137CD8"
    - "CD137KI67"
    - "CD137PD1"
    - "CD137CM"
    - "CD137EFF"
    - "CD137EMRA"
    - "CD137NAIVE"
    - "KI67"
    - "KI67CD4"
    - "KI67CD8"
    - "KI67CM"
    - "KI67EFF"
    - "KI657EMRA"   # Kept verbatim as requested
    - "KI67NAIVE"
    - "PD1"
    - "PD1CD4"
    - "PD1CD8"
    - "PD1KI67"
    - "PD1CM"
    - "PD1EFF"
    - "PD1EMRA"
    - "PD1NAIVE"
  soluble:
    - "total_WBC"
    - "neutrophils"
    - "lymphocytes"
    - "neutrophils/lymphocytes"
    - "NOX2(pg/mL)"
    - "CD4/CD8"

# --- Quality Control ---
qc:
  max_na_row_pct: 0.40       
  max_na_col_facs_pct: 0.20  
  max_na_col_sol_pct: 0.50   
  remove_outliers: true
  outlier_conf_level: 0.99

# --- Transformation & Imputation ---
transformation:
  facs_method: "logit"       
  facs_format: "percentage"  
  soluble_method: "log2"     
  epsilon: 1e-4         

stats:
  seed: 2026

# --- Multivariate Analysis (sPLS-DA) ---
multivariate:
  n_comp: 2           
  validation_folds: 5 
  n_repeat_cv: 50
  top_n_loadings: 15  

# --- Visualization & Colors ---
# EXPANDED: Contains all possible labels injected by the mini-configs
colors:
  groups:
    # Toxicity labels
    Tox_Yes: "#B2182B"       # Red
    Tox_No: "#2E8B57"        # Green
    # Best Response labels
    RP: "#2E8B57"            # Green
    SD_PD: "#B2182B"         # Red
    # Comorbidity labels
    Comorb_Yes: "#B2182B"    # Red
    Comorb_No: "#2E8B57"     # Green
    # Legacy fallbacks
    Responder: "#2E8B57"     
    Non_Responder: "#B2182B" 
  plsda:
    positive: "#B2182B"
    negative: "#2E8B57"
  heatmap:
    low: "#2166AC"    
    mid: "#F7F7F7"    
    high: "#B2182B"